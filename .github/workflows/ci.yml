name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

# Default to read-only permissions for all jobs.
permissions:
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Provide dummy values so the build can run without real secrets
      DATABASE_URL: ""
      ADMIN_TOKEN: "ci-token"
      PLATFORM_FEE_BPS: "10"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --passWithNoTests

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high || true
